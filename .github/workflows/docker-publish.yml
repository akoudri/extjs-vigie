# Build de l'image VIGIE et publication sur Docker Hub (pueblo2708/vigie).
#
# Prérequis : deux secrets dans Settings > Secrets and variables > Actions :
#   - DOCKERHUB_USERNAME : pueblo2708
#   - DOCKERHUB_TOKEN    : un access token Docker Hub (Account Settings >
#                          Personal access tokens), portée Read & Write.
name: Docker publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: pueblo2708/vigie

jobs:
  # Scan Trivy des dépendances npm (package-lock.json). Bloquant sur
  # HIGH/CRITICAL corrigeables. Les devDependencies sont exclues par
  # défaut : seules les dépendances embarquées dans le build comptent.
  scan-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy - vulnérabilités des dépendances (tableau)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Trivy - vulnérabilités des dépendances (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF vers GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Upload rapport JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 30

  build-and-push:
    runs-on: ubuntu-latest
    needs: scan-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pas de push pour les PR : on vérifie juste que l'image se construit.
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tags générés : latest + sha court sur main, x.y.z sur les tags v*.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de couches entre les runs (la couche npm ci est la plus
          # coûteuse ; elle n'est reconstruite que si le lockfile change).
          cache-from: type=gha
          cache-to: type=gha,mode=max
